<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .container {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rings {
      position: relative;
      width: 420px;
      height: 200px;
    }

    .ring {
      width: 8rem;
      height: 8rem;
      border: 0.5rem solid;
      border-radius: 50%;
      position: absolute;

    }

    .ring::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      top: -0.5rem;
      left: -0.5rem;
      z-index: 1;
    }

    .blue {
      border-color: blue;
      left: 0;
      top: 0;
    }

    .blue::after {
      clip-path: inset(0 0 0 90%);
      border: 0.5rem solid blue;
    }

    .black {
      border-color: black;
      left: 9rem;
      top: 0;
    }


    .black::after {
      clip-path: inset(0 0 0 90%);
      border: 0.5rem solid black;
    }

    .red {
      border-color: red;
      left: 18rem;
      top: 0;
    }

    .red::after {
      clip-path: inset(0 0 0 90%);
      border: 0.5rem solid red;
    }

    .yellow {
      border-color: yellow;
      left: 4.5rem;
      top: 4rem;
    }

    .yellow::after {
      clip-path: inset(0 0 90% 50%);

      border: 0.5rem solid yellow;
    }

    .green {
      border-color: green;
      left: 13.5rem;
      top: 4rem;
    }

    .green::after {
      clip-path: inset(0 0 90% 50%);
      border: 0.5rem solid green;
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="rings">
      <div class="ring blue"></div>
      <div class="ring yellow"></div>
      <div class="ring black"></div>
      <div class="ring green"></div>
      <div class="ring red"></div>
    </div>
  </main>
</body>

</html>
