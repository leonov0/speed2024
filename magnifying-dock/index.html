<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .container {
      min-height: 100dvh;
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: center;
    }

    .item {
      width: 5rem;
      height: 5rem;
      background-color: purple;
      transition: transform 200ms ease-out;
      will-change: transform;
      pointer-events: none;
    }

    .glow {
      position: absolute;
      pointer-events: none;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(40px);
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.2);
      opacity: 0;
      z-index: 1;
      mix-blend-mode: screen;
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="glow" aria-hidden="true"></div>
  </main>

  <script>
    const container = document.querySelector('.container');
    const items = Array.from(container.querySelectorAll('.item'));
    const glow = container.querySelector('.glow');

    const maxDistance = 340;
    const maxScale = 1.3;

    let mouse = { x: 0, y: 0, inside: false };
    let rafId = null;

    function onPointerMove(e) {
      mouse.inside = true;

      const rect = container.getBoundingClientRect();

      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;

      if (!rafId) rafId = requestAnimationFrame(update);
    }

    function onPointerLeave() {
      mouse.inside = false;

      items.forEach((item) => {
        item.style.transform = '';
      });

      glow.style.opacity = '0';
    }

    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }

    function update() {
      rafId = null;

      const rect = container.getBoundingClientRect();

      glow.style.left = mouse.x + 'px';
      glow.style.top = mouse.y + 'px';
      glow.style.opacity = mouse.inside ? '1' : '0';

      items.forEach((item) => {
        const itemRect = item.getBoundingClientRect();
        const cx = itemRect.left - rect.left + itemRect.width / 2;
        const cy = itemRect.top - rect.top + itemRect.height / 2;
        const dx = mouse.x - cx;
        const dy = mouse.y - cy;
        const dist = Math.hypot(dx, dy);

        const t = clamp(1 - dist / maxDistance, 0, 1);
        const scale = 1 + (maxScale - 1) * t;

        item.style.transform = `scale(${scale})`;
      });
    }

    function onPointerEnter(e) {
      mouse.inside = true;

      if (!rafId) rafId = requestAnimationFrame(update);
    }

    container.addEventListener('pointermove', onPointerMove);
    container.addEventListener('pointerleave', onPointerLeave);
    container.addEventListener('pointerenter', onPointerEnter);
  </script>
</body>

</html>
