<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        :root {
            --dot1: calc(100% - 60%);
            --dot2: calc(100% - 20%);
            --dot3: calc(100% - 90%);
            --dot4: calc(100% - 50%);
        }

        .container {
            padding: 1rem;
            border: 1px solid black;
            max-width: fit-content;
            margin: 8rem auto;
        }

        .chart {
            position: relative;
            width: 400px;
            height: 400px;
        }

        .connect {
            background: black;
            position: absolute;
            inset: 0;
            transition: 1s;
            clip-path: polygon(calc(100% / 3 * 0) 100%,
                    calc(100% / 3 * 1) 100%,
                    calc(100% / 3 * 2) 100%,
                    calc(100% / 3 * 3) 100%,
                    calc(100% / 3 * 3) calc(100% - 1px),
                    calc(100% / 3 * 2) calc(100% - 1px),
                    calc(100% / 3 * 1) calc(100% - 1px),
                    calc(100% / 3 * 0) calc(100% - 1px));
        }

        .dot {
            z-index: 1;
            background: black;
            position: absolute;
            transition: 1s;
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
            border: 4px solid white;
            transform: translate(-50%, -50%);
            top: 100%;
        }

        .dot:nth-child(1) {
            left: calc(100% / 3 * 0);
        }

        .dot:nth-child(2) {
            left: calc(100% / 3 * 1);
        }

        .dot:nth-child(3) {
            left: calc(100% / 3 * 2);
        }

        .dot:nth-child(4) {
            left: calc(100% / 3 * 3);
        }

        .container:hover .connect {
            clip-path: polygon(calc(100% / 3 * 0) var(--dot1),
                    calc(100% / 3 * 1) var(--dot2),
                    calc(100% / 3 * 2) var(--dot3),
                    calc(100% / 3 * 3) var(--dot4),
                    calc(100% / 3 * 3) calc(var(--dot4) - 1px),
                    calc(100% / 3 * 2) calc(var(--dot3) - 1px),
                    calc(100% / 3 * 1) calc(var(--dot2) - 1px),
                    calc(100% / 3 * 0) calc(var(--dot1) - 1px));
        }

        .container:hover .dot:nth-child(1) {
            top: var(--dot1);
        }

        .container:hover .dot:nth-child(2) {
            top: var(--dot2);
        }

        .container:hover .dot:nth-child(3) {
            top: var(--dot3);
        }

        .container:hover .dot:nth-child(4) {
            top: var(--dot4);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="chart">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="connect"></div>
        </div>
    </div>
</body>

</html>
